coverage:
  status:
    project:
      default:
        target: auto    # Fail if coverage drops from base branch
        threshold: 1%   # Allow 1% fluctuation
    patch:
      default:
        target: 80%     # New code must have 80%+ coverage

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: true   # Only comment when coverage changes
